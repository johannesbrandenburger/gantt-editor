default:
  tags:
    - pf-nbg

image: node:22

stages:
  - build
  - test
  - publish

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/

test:
  stage: test
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  script:
    - npm ci
    - npm run test:e2e

publish:
  image: node:22
  stage: publish
  rules:
    # TEMP: if on <skip> branch, publish regardless of changes to package.json
    # - if: $CI_COMMIT_BRANCH == "<skip>"
    #   when: on_success
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_REF_NAME =~ /^v\d+\.\d+\.\d+.*$/
      when: on_success
      changes:
        - package.json
    - when: never
  script:
    # If no .npmrc is included in the repo, generate a temporary one that is configured to publish to GitLab's NPM registry
    - |
      if [[ ! -f .npmrc ]]; then
        echo 'No .npmrc found! Creating one now. Please review the following link for more information: https://docs.gitlab.com/ee/user/packages/npm_registry/#with-the-npmrc-file'
        {
          echo "@${CI_PROJECT_ROOT_NAMESPACE}:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
          echo "${CI_API_V4_URL#http*:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=\${CI_JOB_TOKEN}"
        } >> .npmrc
      fi
    - echo "Created the following .npmrc:"; cat .npmrc

    # Fail fast when the package registry is unreachable instead of hanging in npm retries.
    - NPM_REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
    - npm ping --registry "$NPM_REGISTRY_URL"

    - VERSION=$(node -p "require('./package.json').version")
    - PACKAGE_NAME=$(node -p "require('./package.json').name")
    - |
      if [[ ! -d "dist/vue" || ! -d "dist/react" || ! -d "dist/angular" || ! -f "dist/types/index.d.ts" ]]; then
        echo "Missing required build outputs in dist/ (expected vue, react, angular, and shared types)"
        exit 1
      fi
    - echo "Publishing ${PACKAGE_NAME}@${VERSION} from repository root"
    - npm publish . --registry "$NPM_REGISTRY_URL" --loglevel verbose --fetch-retries=1 --fetch-retry-mintimeout=1000 --fetch-retry-maxtimeout=5000
